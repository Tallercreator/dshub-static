# Netlify — деплой статического Astro-сайта.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Бессерверные функции (форма «Предложить кейс» → Telegram).
# Секреты — в Netlify UI (Site settings → Environment variables):
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
[functions]
  directory = "netlify/functions"

# Astro сам делает чистые URL; на всякий случай — мягкий fallback 404.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
